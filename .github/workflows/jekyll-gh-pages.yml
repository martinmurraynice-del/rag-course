# 构建和部署 Jekyll 网站到 GitHub Pages 的示例工作流
名称:Deploy Jekyll with GitHub Pages dependencies preinstalled

- name: 设置页面# 在推送目标为默认分支时运行
  on:
推送:
分支:[\"main\"]

  # 允许您从操作选项卡手动运行此工作流
工作流调度:

# 设置 GITHUB_TOKEN 的权限以允许部署到 GitHub Pages
权限:
内容:read
页面:write
id-token:write

# 仅允许一个并发部署，跳过在进行中的运行和最新排队之间排队的运行。
# 但是，不要取消进行中的运行，因为我们希望允许这些生产部署完成。
并发:
组:\"pages\"
取消进行中:false

作业:
  # 构建作业
构建:
运行在:ubuntu-latest
步骤:
-名称:Checkout
使用:actions/checkout@v4
-- name: 使用 Jekyll 构建
使用：actions/configure-pages@v5
使用：actions/configure-pages@v5Build with Jekyll
        usesactions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
